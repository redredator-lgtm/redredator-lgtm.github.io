<!DOCTYPE html>
<html lang="pt-BR" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página não encontrada · RED</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>%F0%9F%93%98</text></svg>">
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --fundo: #1A1A1A;
      --creme: #F5F0E8;
      --dourado: #C9A84C;
      --texto: #C8C0B0;
      --borda: #2E2E2E;
    }
    body {
      background: var(--fundo);
      color: var(--creme);
      font-family: 'Georgia', serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      gap: 1.5rem;
    }
    h1 { font-size: 5rem; color: var(--dourado); line-height: 1; }
    p { color: var(--texto); font-size: 1rem; max-width: 320px; line-height: 1.6; }
    a {
      color: var(--dourado);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-bottom: 1px solid var(--dourado);
      padding-bottom: 2px;
    }
    a:hover { opacity: 0.7; }
  </style>
</head>
<body>
  <h1>404</h1>
  <p>Esta página não existe ou foi movida.</p>
  <a href="/">Voltar para o início</a>
</body>
</html>
